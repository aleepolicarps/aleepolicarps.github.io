# The Python programming language

- Python is a **high-level language** similar to C, C++ and Java. Meaning the computer cannot directly run applications written in Python.

- While C++ and Java requires compilers to run, Python needs an interpreter.

---

### Compiler

<img src="images/compiler.png" style="width:100%;">

A *compiler* reads the program and translates it completely before the program starts running.

In programming languages that uses compiler, you often encounter `Compile Time Errors`.

---

### Interpreter
<div style="width:100%;text-align:center;"><img src="images/interpreter.png" style="width:60%;"></div>

An interpreter reads a high-level program and executes it, meaning that it does what the program says. It processes the program a little at a time, alternately reading lines and performing computations.


---
# Python is an interpreted language

Python code is executed by an interpreter and there are two ways to use the interpreter: **interactive mode** and **script mode**.

### Interactive Mode

You type Python programs directly into the prompt, and the interpreter executes the line.

```python
>>> 1 + 1
2
```

The chevron, `>>>` , is the prompt the interpreter uses to indicate that it is ready.

---

### Script Mode

You can store your Python code in a file and use the interpreter to execute it. By convention, Python scripts have file names that end with `.py`.

To execute the script, you have to tell the interpreter the name of the file.

e.g.

You want to run a Python script named `hello_world.py`. Assuming you are in the same directory as `hello_world.py`,

You can execute you Python script by running the comman `python hello_world.py` into the terminal or command line.

---

## `Hello, world!` in Interactive Mode

Open a Python Interpreter and type in the ff after the `>>>`

```python
>>> print('Hello, world!')
```

---

## `Hello, world!` in Script Mode

1. Open a text editor

2. Type `print('Hello, world!')`

3. Save the file as `hello_world.py`

4. Open a terminal or a command line

5. Change the current directory to the directory of `hello_wcorld.py`

6. Run the program by running `python hello_world.py`

# Variables

An **assignment statement** creates new variables and gives them value:

```python
>>> message = 'Welcome back to School!'
>>> n = 17
>>> pi = 3.141
```


In Python, you do not need to specify the type of the variable on initialization. The type of the variable will automatically be the type of the value assigned to it.

e.g.

```python
>>> message = 'Welcome back to School!'
>>> type(message)
<type 'str'>

>>> n = 17
>>> type(n)
<type 'int'>

>>> pi = 3.141
>>> type(n)
<type 'int'>
```

---

# Variable names and keywords

While you are in charge of naming your variables, programmers generally choose names for their variables that are **meaningful**.

 - Variable names can contain both letters and number but they have to begin with a letter.
 - Ideally begins with a lowercase letter (even though uppercase if perfectly valid)
 - Can contain underscore(_). Underscore is oftend used in names with multiple words.

#### What happens if you declare an illegal variable name?
* Answer: * You get a syntax error!

Example of invalid syntax
```python
>>> 76trombones = 'big parade'
SyntaxError: invalid syntax
>>> class = 'Web Development'
SyntaxError: invalid syntax
>>> more@ = 10000
SyntaxError: invalid syntax
```

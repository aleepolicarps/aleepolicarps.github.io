# PHP

PHP is an acronym for "PHP: Hypertext Preprocessor"

PHP is a widely-used, open source scripting language

PHP scripts are executed on the server

PHP is free to download and use

---

# What is a PHP File?

PHP files can contain text, HTML, CSS, JavaScript, and PHP code

PHP code is executed on the server, and the result is returned to the browser as plain HTML

PHP files have extension `".php"`

---

# What Can PHP Do?

PHP can generate dynamic page content

PHP can create, open, read, write, delete, and close files on the server

PHP can collect form data

PHP can send and receive cookies

PHP can add, delete, modify data in your database

PHP can be used to control user-access

PHP can encrypt data


**With PHP you are not limited to output HTML. You can output images, PDF files, and even Flash movies. You can also output any text, such as XHTML and XML.**

---

# Why PHP?

PHP runs on various platforms (Windows, Linux, Unix, Mac OS X, etc.)

PHP is compatible with almost all servers used today (Apache, IIS, etc.)

PHP supports a wide range of databases

PHP is free. Download it from the official PHP resource: www.php.net

PHP is easy to learn and runs efficiently on the server side

---

# How to start using PHP

You need to have a web server installed on your PC that can process PHP. In our case we will use XAMPP.

1. Open up a text editor and type in "Hello world!".
2. Save the as "hello.php" in C:/Program Files/XAMPP/htdocs
3. Open up a web browser and navigate to "localhost/hello.php"

---

# PHP Syntax

A PHP script can be placed anywhere in the document.

A PHP script starts with `<?php` and ends with `?>`:

```PHP
<?php
// PHP code goes here
?>
```

A PHP file normally contains HTML tags, and some PHP scripting code.

---

Modify "hello.php" with the ff content:

```PHP
<!DOCTYPE html>
<html>
    <body>

        <h1>My first PHP page</h1>

    <?php
        echo "Hello World!";
    ?>

    </body>
</html>
```

We have an example of a simple PHP file, with a PHP script that uses a built-in PHP function "echo" to output the text "Hello World!" on a web page.

# PHP Case Sensitivity

In PHP, NO keywords (e.g. if, else, while, echo, etc.), classes, functions, and user-defined functions are case-sensitive.

In the example below, all three echo statements below are equal and legal:

```PHP
<!DOCTYPE html>
<html>
    <body>

    <?php
        ECHO "Hello World!<br>";
        echo "Hello World!<br>";
        EcHo "Hello World!<br>";
    ?>

    </body>
</html>
```

---

## Note: However; all variable names are case-sensitive!

Look at the example below; only the first statement will display the value of the $color variable! This is because $color, $COLOR, and $coLOR are treated as three different variables:

```PHP
<!DOCTYPE html>
<html>
    <body>

    <?php
        $color = "red";
        echo "My car is " . $color . "<br>";
        echo "My house is " . $COLOR . "<br>";
        echo "My boat is " . $coLOR . "<br>";
    ?>

    </body>
</html>
```

# Comments in PHP

A comment in PHP code is a line that is not executed as a part of the program. Its only purpose is to be read by someone who is looking at the code.

Comments can be used to:
 - Let others understand your code
 - Remind yourself of what you did - Most programmers have experienced coming back to their own work a year or two later and having to re-figure out what they did. Comments can remind you of what you were thinking when you wrote the code


 PHP supports several ways of commenting:

---
Syntax for single-line comments:
```PHP
<!DOCTYPE html>
<html>
    <body>

    <?php
        // This is a single-line comment

        # This is also a single-line comment
    ?>

    </body>
</html>
```

Syntax for multiple-line comments:

```php
<!DOCTYPE html>
<html>
    <body>

    <?php
        /*
        This is a multiple-lines comment block
        that spans over multiple
        lines
        */
    ?>

    </body>
</html>
```
---

Using comments to leave out parts of the code:

```php
<!DOCTYPE html>
<html>
    <body>

    <?php
        // You can also use comments to leave out parts of a code line
        $x = 5 /* + 15 */ + 5;
        echo $x;
    ?>

    </body>
</html>
```

# Creating (Declaring) PHP Variables

In PHP, a variable starts with the $ sign, followed by the name of the variable:

```PHP
<?php
    $txt = "Hello world!";
    $x = 5;
    $y = 10.5;
?>
```


After the execution of the statements above, the variable $txt will hold the value Hello world!, the variable $x will hold the value 5, and the variable $y will hold the value 10.5.

Note: When you assign a text value to a variable, put quotes around the value.

Note: Unlike other programming languages, PHP has no command for declaring a variable. It is created the moment you first assign a value to it.

---

A variable can have a short name (like x and y) or a more descriptive name (age, carname, total_volume).

Rules for PHP variables:


 - A variable starts with the $ sign, followed by the name of the variable
 - A variable name must start with a letter or the underscore character
 - A variable name cannot start with a number
 - A variable name can only contain alpha-numeric characters and underscores (A-z, 0-9, and _ )
 - Variable names are case-sensitive ($age and $AGE are two different variables)

---

# Output Variables

The PHP echo statement is often used to output data to the screen.

```php
<?php
    $txt = "W3Schools.com";
    echo "I love $txt!";
?>
```

```php
<?php
    $txt = "W3Schools.com";
    echo "I love " . $txt . "!";
?>
```

```php
<?php
    $x = 5;
    $y = 4;
    echo $x + $y;
?>
```

# PHP is a Loosely Typed Language

In the example above, notice that we did not have to tell PHP which data type the variable is.

PHP automatically associates a data type to the variable, depending on its value. Since the data
types are not set in a strict sense, you can do things like adding a string to an integer without causing an error.

---
# PHP Data Types

Variables can store data of different types, and different data types can do different things.

 - String
 - Integer
 - Float (floating point numbers - also called double)
 - Boolean
 - Array
 - Object
 - NULL
 - Resource

---
# PHP String

A string is a sequence of characters, like "Hello world!".

A string can be any text inside quotes. You can use single or double quotes:

```php
<?php
    $x = "Hello world!";
    $y = 'Hello world!';

    echo $x;
    echo "<br>";
    echo $y;
?>
```

---

# PHP Integer

An integer data type is a non-decimal number between -2,147,483,648 and 2,147,483,647.

Rules for integers:

- An integer must have at least one digit
- An integer must not have a decimal point
- An integer can be either positive or negative

Integers can be specified in: decimal (base 10), hexadecimal (base 16), octal (base 8), or binary (base 2) notation.


In the following example $x is an integer. The PHP var_dump() function returns the data type and value:

```php
<?php
    $x = 5985;
    var_dump($x);
?>
```

---

# PHP Float

A float (floating point number) is a number with a decimal point or a number in exponential form.

In the following example $x is a float. The PHP var_dump() function returns the data type and value:

```php
<?php
    $x = 10.365;
    var_dump($x);
?>
```
---

# PHP Boolean

A Boolean represents two possible states: TRUE or FALSE.

```php
$x = true;
$y = false;
```
